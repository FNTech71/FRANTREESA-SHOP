<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0f1f14"/>
<title>Frantreesa Mini Mart & Cold Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --f:#0f1f14;--pine:#1a3320;--em:#1e4d2b;--jade:#2d6a3f;--leaf:#3d8b50;--mint:#5aab6a;
  --foam:#e8f5eb;--mist:#f4fbf5;
  --arc:#0c2340;--oce:#0e4272;--sky:#1565c0;--frost:#e3f2fd;--ice:#bbdefb;
  --gld:#c9a84c;--gldb:#fdf8ec;
  --ink:#0d1117;--dim:#24292e;--mut:#586069;--sft:#8b949e;--ln:#d0d7de;--pale:#f6f8fa;
  --red:#da3633;--amb:#d29922;--grn:#238636;
  --sw:238px;--r:7px;--rl:11px;--rx:17px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shm:0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
  --shl:0 8px 32px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.08);
  --font:'Inter',sans-serif;--serif:'Playfair Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--pale);color:var(--ink);font-size:14px;line-height:1.5;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:var(--font)}
button{cursor:pointer;border:none;background:none}
input[type=number]::-webkit-inner-spin-button{opacity:1}
input,select{border:1.5px solid var(--ln);border-radius:var(--r);padding:9px 12px;font-size:14px;color:var(--ink);background:#fff;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:var(--jade);box-shadow:0 0 0 3px rgba(45,106,63,.1)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--f);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:9999;transition:opacity .35s}
#loading.out{opacity:0;pointer-events:none}
.ld-name{font-family:var(--serif);font-size:30px;color:#fff;letter-spacing:.5px}
.ld-sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px;text-align:center}
.ld-bar{width:160px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:6px}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--gld));animation:lb 1.6s ease infinite}
@keyframes lb{0%{width:0;margin-left:0}50%{width:55%;margin-left:20%}100%{width:0;margin-left:100%}}
@keyframes popIn{from{transform:scale(.93) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes scIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:linear-gradient(145deg,#060f09,var(--f) 40%,var(--pine));align-items:center;justify-content:center;z-index:800;padding:20px}
#login-screen.show{display:flex}
.login-wrap{width:100%;max-width:430px;animation:popIn .3s cubic-bezier(.16,1,.3,1)}
.login-hero{text-align:center;margin-bottom:30px}
.login-hero-name{font-family:var(--serif);font-size:28px;color:#fff;letter-spacing:.3px}
.login-hero-tag{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2.5px;text-transform:uppercase;margin-top:5px}
.login-hero-line{width:36px;height:1px;background:rgba(255,255,255,.15);margin:14px auto}
.login-hero-sub{font-size:13px;color:rgba(255,255,255,.45);font-weight:500}
.login-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:var(--shl)}
.lc-top{background:linear-gradient(135deg,var(--pine),var(--em));padding:24px 28px 20px}
.lc-top-h{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px}
.lc-top-s{font-size:12px;color:rgba(255,255,255,.45);font-weight:500}
.lc-body{padding:26px 28px 30px}
.lfield{margin-bottom:15px}
.lfield label{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px}
.lfield input{padding:11px 13px;font-size:15px;border-radius:9px}
.lerr{background:#fff0f0;border:1px solid #fca5a5;color:var(--red);font-size:13px;font-weight:500;padding:10px 13px;border-radius:8px;margin-bottom:13px;display:none}
.lerr.show{display:block}
.signin-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--jade),var(--leaf));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(45,106,63,.3);letter-spacing:.2px}
.signin-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,106,63,.4)}
.signin-btn:active{transform:scale(.98)}
.signin-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.or-row{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--sft);font-size:12px;font-weight:500}
.or-row::before,.or-row::after{content:'';flex:1;height:1px;background:var(--ln)}
.google-btn{width:100%;padding:11px;background:#fff;color:var(--dim);border:1.5px solid var(--ln);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.google-btn:hover{background:var(--pale);border-color:var(--jade)}
.login-note{text-align:center;margin-top:18px;font-size:12px;color:rgba(255,255,255,.3);font-weight:500}
/* PENDING */
.pending-card{background:#fff;border-radius:18px;padding:32px 28px;text-align:center;max-width:380px;margin:0 auto;box-shadow:var(--shl)}
.pending-icon{font-size:40px;margin-bottom:14px}
.pending-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px}
.pending-sub{font-size:13px;color:var(--sft);line-height:1.6;margin-bottom:20px}
.pending-email{background:var(--pale);border:1px solid var(--ln);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--dim);margin-bottom:20px;word-break:break-all}

/* SHELL */
#shell{display:none;min-height:100vh}
#shell.show{display:flex}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--f);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;flex-shrink:0}
.sb-brand{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-row{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.sb-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--jade),var(--leaf));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-name{font-family:var(--serif);font-size:16px;color:#fff;line-height:1.2}
.sb-sub{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:1.5px;text-transform:uppercase;margin-left:44px}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .14s;margin-bottom:1px;font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;position:relative}
.sni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sni.active{background:rgba(255,255,255,.11);color:#fff}
.sni.active::before{content:'';position:absolute;left:0;top:22%;height:56%;width:3px;background:var(--mint);border-radius:0 3px 3px 0}
.sni svg{flex-shrink:0;opacity:.65}.sni.active svg,.sni:hover svg{opacity:1}
.sni-ice{color:rgba(147,210,246,.6)}.sni-ice.active,.sni-ice:hover{background:rgba(21,101,192,.18);color:#90caf9}
.sni-ice.active::before{background:#64b5f6}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;border-radius:10px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 4px}
.sb-badge.warn{background:var(--amb)}
.sb-footer{padding:11px 13px 18px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;background:rgba(255,255,255,.04);margin-bottom:9px}
.sb-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;object-fit:cover;border:2px solid rgba(255,255,255,.12)}
.sb-av-ph{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--jade),var(--leaf));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.sb-urole.admin{color:rgba(90,171,106,.8)}
.sb-urole.worker{color:rgba(100,181,246,.7)}
.sb-logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.3);font-size:12px;font-weight:500;cursor:pointer;padding:6px 10px;border:none;background:none;width:100%;border-radius:6px;transition:all .15s}
.sb-logout:hover{color:rgba(255,255,255,.65);background:rgba(255,255,255,.04)}

/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--ln);padding:0 26px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-date{font-size:12px;color:var(--sft);font-weight:500}
.tb-live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sft);font-weight:600}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s ease infinite;flex-shrink:0}
.ldot.off{background:var(--amb);animation:none}
.tb-alert{background:var(--gldb);border:1px solid #e8d080;color:var(--amb);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;display:none;align-items:center;gap:5px}
.content{flex:1;padding:22px 26px 46px}

/* MOBILE */
.mob-hdr{display:none;background:var(--f);padding:12px 15px 10px;position:sticky;top:0;z-index:100}
.mh1{display:flex;align-items:center;justify-content:space-between}
.mh-nm{font-family:var(--serif);font-size:15px;color:#fff}
.mh-s{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
.mrb{padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.mrb.admin{background:rgba(90,171,106,.2);color:#86efac}
.mrb.worker{background:rgba(100,181,246,.2);color:#93c5fd}
.mob-out{color:rgba(255,255,255,.4);font-size:12px;display:flex;align-items:center;gap:4px;font-weight:500}
.mob-alert{font-size:11px;font-weight:600;padding:4px 11px;background:rgba(210,153,34,.14);border:1px solid rgba(210,153,34,.3);color:#fbbf24;border-radius:20px;cursor:pointer;display:none;margin-top:7px}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--ln);z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-i{display:flex;max-width:600px;margin:0 auto}
.nb{flex:1;padding:7px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;position:relative}
.nb span{font-size:10px;color:var(--sft);font-weight:600;transition:color .14s}
.nb.active span{color:var(--jade)}
.nb.nbice span{color:var(--sky)!important}
.nbb{position:absolute;top:3px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:8px;border-radius:10px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 3px}
.nbb.warn{background:var(--amb)}

/* PAGES */
.page{display:none}.page.active{display:block;animation:fu .18s ease}

/* STAT CARDS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:22px}
.sc{background:#fff;border:1px solid var(--ln);border-radius:var(--rl);padding:15px 17px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:box-shadow .2s}
.sc:hover{box-shadow:var(--shm)}
.sc-ac{position:absolute;top:0;left:0;right:0;height:3px}
.sc-lb{font-size:10px;color:var(--sft);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:5px}
.sc-v{font-size:21px;font-weight:700;color:var(--ink);letter-spacing:-.4px}
.sc-s{font-size:11px;color:var(--sft);margin-top:3px;font-weight:500}

/* CARDS */
.card{background:#fff;border:1px solid var(--ln);border-radius:var(--rl);padding:17px 19px;box-shadow:var(--sh)}
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:17px}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 15px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid transparent;white-space:nowrap;letter-spacing:.1px}
.btn-p{background:linear-gradient(135deg,var(--jade),var(--leaf));color:#fff;box-shadow:0 2px 8px rgba(45,106,63,.2)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(45,106,63,.3)}
.btn-ice{background:linear-gradient(135deg,var(--arc),var(--oce));color:#fff;box-shadow:0 2px 8px rgba(14,66,114,.2)}
.btn-ice:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(14,66,114,.3)}
.btn-s{background:var(--pale);color:var(--dim);border-color:var(--ln)}.btn-s:hover{background:var(--ln)}
.btn-d{background:#fff0f0;color:var(--red);border-color:#fca5a5}.btn-d:hover{background:#fee2e2}
.btn-g{background:linear-gradient(135deg,#b8963e,var(--gld));color:#fff;box-shadow:0 2px 8px rgba(201,168,76,.25)}
.btn-g:hover{transform:translateY(-1px)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-full{width:100%;padding:12px}
.btn:disabled{opacity:.44;cursor:not-allowed;transform:none!important}
.btn:active{transform:scale(.98)!important}

/* SEARCH */
.sw{position:relative}.sw input{padding-left:35px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sft);pointer-events:none}

/* PILLS */
.pills{display:flex;gap:5px;overflow-x:auto;padding-bottom:5px;scrollbar-width:none;flex-wrap:wrap}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--ln);color:var(--mut);background:#fff;transition:all .14s;white-space:nowrap}
.pill:hover{border-color:var(--jade);color:var(--jade)}
.pill.active{background:var(--jade);color:#fff;border-color:var(--jade)}
.pill.ice-active{background:var(--sky);color:#fff;border-color:var(--sky)}

/* PRODUCT TILES */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px;margin-top:9px}
.ptile{background:#fff;border:1px solid var(--ln);border-radius:var(--rl);padding:13px 14px;cursor:pointer;transition:all .14s;box-shadow:var(--sh);position:relative}
.ptile:hover{border-color:var(--jade);box-shadow:var(--shm);transform:translateY(-2px)}
.ptile:active{transform:scale(.97)}
.ptile.out{opacity:.4;pointer-events:none}
.ptile.low{border-color:#e8d080}
.ptile.cold{border-color:var(--ice);background:linear-gradient(135deg,#f8fcff,var(--frost))}
.ptile.cold:hover{border-color:var(--sky)}
.ptb{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px}
.ptb.lb{background:var(--gldb);color:var(--amb)}.ptb.ob{background:#fff0f0;color:var(--red)}
.pname{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:2px;padding-right:8px}
.pcat{font-size:11px;color:var(--sft);margin-bottom:9px;font-weight:500}
.pfoot{display:flex;justify-content:space-between;align-items:center}
.pprice{font-size:15px;font-weight:700;color:var(--jade)}
.pprice.cp{color:var(--sky)}
.pstk{font-size:11px;color:var(--sft);font-weight:500}
.pstk.lw{color:var(--amb);font-weight:700}.pstk.ot{color:var(--red);font-weight:700}

/* POS LAYOUT */
.pos-layout{display:grid;grid-template-columns:1fr 328px;gap:17px;align-items:start}
.cart-panel{background:#fff;border:1px solid var(--ln);border-radius:var(--rl);box-shadow:var(--sh);position:sticky;top:78px;overflow:hidden}
.cart-hdr{padding:13px 16px;border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--f),var(--pine))}
.cart-hdr-t{font-size:13px;font-weight:700;color:#fff}
.cart-hdr-c{font-size:11px;color:rgba(255,255,255,.45);font-weight:500}
.cart-body{padding:2px 0;max-height:calc(100vh - 355px);overflow-y:auto}
.citem{display:flex;align-items:center;gap:7px;padding:9px 15px;border-bottom:1px solid var(--pale)}
.citem:last-child{border-bottom:none}
.cname{flex:1;font-size:13px;font-weight:500;color:var(--dim)}
.qctl{display:flex;align-items:center;gap:3px}
.qbtn{width:24px;height:24px;border-radius:6px;background:var(--pale);color:var(--mut);font-size:14px;display:flex;align-items:center;justify-content:center;border:1px solid var(--ln);transition:all .12s}
.qbtn:hover{background:var(--ln)}
.qnum{font-size:13px;font-weight:700;min-width:19px;text-align:center;color:var(--ink)}
.csub{font-size:13px;font-weight:700;color:var(--jade);min-width:58px;text-align:right}
.csub.cold-c{color:var(--sky)}
.rmv{color:var(--ln);font-size:16px;line-height:1;padding:0 2px;transition:color .12s}
.rmv:hover{color:var(--red)}
.cart-empty{padding:32px 14px;text-align:center;color:var(--sft);font-size:13px;font-weight:500}
.cart-foot{padding:13px 15px;border-top:1px solid var(--ln);background:var(--pale)}
.ctr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.ctr-lbl{font-size:11px;color:var(--sft);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ctr-val{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.4px}

/* INV TABLE */
.inv-tbl{width:100%;border-collapse:collapse}
.inv-tbl th{font-size:10px;font-weight:700;color:var(--sft);text-transform:uppercase;letter-spacing:.7px;padding:9px 13px;border-bottom:2px solid var(--ln);text-align:left;background:var(--pale)}
.inv-tbl td{padding:11px 13px;border-bottom:1px solid var(--pale);font-size:13px;color:var(--dim)}
.inv-tbl tr:hover td{background:#fafbfc}
.inv-tbl tr:last-child td{border-bottom:none}
.inv-tbl tr.crow td{background:var(--frost)}
.inv-tbl tr.crow:hover td{background:#e1f0fa}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block}
.abtns{display:flex;gap:5px}

/* COLD BANNER */
.cold-banner{background:linear-gradient(120deg,var(--arc),var(--oce));border-radius:var(--rl);padding:17px 22px;margin-bottom:17px;display:flex;align-items:center;gap:14px;color:#fff;box-shadow:0 4px 16px rgba(12,35,64,.28)}
.cb-e{font-size:28px;flex-shrink:0}
.cb-t{font-size:15px;font-weight:700;margin-bottom:2px;letter-spacing:-.2px}
.cb-s{font-size:12px;opacity:.6;font-weight:500}

/* SALE ROWS */
.srow{background:#fff;border:1px solid var(--ln);border-radius:var(--rl);padding:13px 15px;margin-bottom:8px;box-shadow:var(--sh)}
.srow-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.s-amt{font-size:15px;font-weight:700;color:var(--jade);letter-spacing:-.3px}
.s-met{font-size:11px;color:var(--sft);margin-top:2px;font-weight:500}

.alert.err{background:#fff0f0;border:1px solid #fca5a5;color:var(--red)}

/* MODALS */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:flex;align-items:center;justify-content:center;padding:17px}
.mov.hidden{display:none}
.mbox{background:#fff;border-radius:18px;width:100%;max-width:455px;max-height:90vh;overflow-y:auto;padding:23px 23px 29px;box-shadow:var(--shl);animation:scIn .22s cubic-bezier(.16,1,.3,1)}

.chbox.short{background:#fff0f0;border-color:#fca5a5}
.chval{font-size:24px;font-weight:700;color:var(--jade);margin-top:2px;letter-spacing:-.5px}
.chval.short{color:var(--red)}
.chlbl{font-size:10px;font-weight:700;color:var(--sft);text-transform:uppercase;letter-spacing:.6px}

.brt{height:7px;background:var(--pale);border-radius:4px;overflow:hidden}
.brf{height:100%;background:linear-gradient(90deg,var(--jade),var(--mint));border-radius:4px;transition:width .55s ease}

.ti{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--pale)}
.ti:last-child{border-bottom:none}
.rkb{width:22px;height:22px;border-radius:50%;background:var(--foam);color:var(--jade);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* SETTINGS */
.user-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--pale)}
.user-row:last-child{border-bottom:none}
.uav{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.uav.adm{background:var(--foam);color:var(--jade)}.uav.wrk{background:var(--frost);color:var(--sky)}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.tag-admin{background:var(--foam);color:var(--jade)}.tag-worker{background:var(--frost);color:var(--sky)}

/* TOAST */
#toast{position:fixed;top:18px;right:22px;padding:10px 17px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(-8px);transition:all .25s cubic-bezier(.16,1,.3,1);pointer-events:none;max-width:310px;box-shadow:var(--shl)}
#toast.show{opacity:1;transform:translateY(0)}
#toast.success{background:var(--f);color:#fff}
#toast.error{background:var(--red);color:#fff}
#toast.warn{background:var(--amb);color:#fff}
#toast.info{background:var(--sky);color:#fff}

/* MISC */
.stl{font-size:11px;font-weight:700;color:var(--sft);text-transform:uppercase;letter-spacing:.8px;margin:19px 0 10px}
.stl:first-child{margin-top:0}
.empty{text-align:center;padding:44px 22px;color:var(--sft)}
.empty-icon{font-size:38px;margin-bottom:11px}
.empty p{font-size:14px;font-weight:500}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar,.topbar{display:none}

  .content{padding:10px 13px 76px}

// AUTH
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('lerr'),btn=document.getElementById('l-btn');
  err.classList.remove('show');
  if(!email||!pass){err.textContent='Enter email and password.';err.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Signing in…';
  try{await auth.signInWithEmailAndPassword(email,pass);}
  catch(e){err.textContent=e.code==='auth/wrong-password'||e.code==='auth/user-not-found'?'Invalid email or password.':e.message;err.classList.add('show');btn.disabled=false;btn.textContent='Sign In';}
}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doGoogle(){
  const prov=new firebase.auth.GoogleAuthProvider();
  try{await auth.signInWithPopup(prov);}
  catch(e){const err=document.getElementById('lerr');err.textContent=e.message;err.classList.add('show');}
}

function doLogout(){
  if(unsubP){unsubP();unsubP=null;}
  if(unsubS){unsubS();unsubS=null;}
  posRdy=false;cart=[];
  auth.signOut();
}

auth.onAuthStateChanged(async user=>{
  if(user){
    CU=user;
    // Owner email always gets admin, auto-creates their user doc
    if(user.email===OWNER_EMAIL){
      CR='admin';
      const ref=db.collection('users').doc(user.uid);
      const snap=await ref.get().catch(()=>null);
      if(!snap||!snap.exists){
        await ref.set({email:user.email,role:'admin',displayName:user.displayName||'Owner',photoURL:user.photoURL||''}).catch(()=>{});
      }
      startApp();return;
    }
    // All other users — must be in users collection
    try{
      const snap=await db.collection('users').doc(user.uid).get();
      if(!snap.exists){
        showPendingScreen(user);
        return;
      }
      CR=snap.data().role||'worker';
    }catch{CR='worker';}
    startApp();
  } else {
    CU=null;CR=null;
    document.getElementById('login-screen').classList.add('show');
    document.getElementById('shell').classList.remove('show');
    document.getElementById('loading').classList.add('out');
    setTimeout(()=>document.getElementById('loading').style.display='none',400);
  }
});

function showPendingScreen(user){
  document.getElementById('login-screen').classList.add('show');
  const lc=document.querySelector('.login-card');
  lc.innerHTML=`<div class="pending-card">
    <div class="pending-icon">⏳</div>
    <div class="pending-title">Account Pending Approval</div>
    <div class="pending-sub">Your Google account has signed in successfully, but hasn't been added to the system yet.<br><br>Ask <strong>nyarkofrederick720@gmail.com</strong> to add you via Settings → Add Team Member using your email:</div>
    <div class="pending-email">${user.email}</div>
    <button class="btn btn-s btn-full" onclick="auth.signOut()">Sign Out</button>
  </div>`;
  document.getElementById('loading').classList.add('out');
  setTimeout(()=>document.getElementById('loading').style.display='none',400);
}

async function startApp(){
  document.getElementById('login-screen').classList.remove('show');
  buildNav();
  const dn=CU.displayName||CU.email.split('@')[0];
  document.getElementById('sb-nm').textContent=dn;
  document.getElementById('sb-rl').textContent=CR;
  document.getElementById('sb-rl').className='sb-urole '+CR;
  const pEl=document.getElementById('sb-photo'),pPh=document.getElementById('sb-ph');
  if(CU.photoURL){pEl.src=CU.photoURL;pEl.style.display='block';pPh.style.display='none';}
  else{pPh.textContent=dn[0].toUpperCase();}
  const mb=document.getElementById('mob-rb');mb.textContent=CR;mb.className='mrb '+CR;
  document.getElementById('tb-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});

  unsubP=db.collection('products').orderBy('name').onSnapshot(snap=>{
    products=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(products.length===0&&isAdmin()){const b=db.batch();SEED.forEach(p=>b.set(db.collection('products').doc(),p));b.commit();}
    updateBadges();
    if(TAB==='dashboard')renderDash();
    else if(TAB==='pos')renderProdGrid();
    else if(TAB==='coldstore')renderCold();
    else if(TAB==='inventory')renderInv();
    else if(TAB==='reports')renderReports();
  },()=>{const d=document.getElementById('ldot'),l=document.getElementById('llbl');if(d)d.className='ldot off';if(l)l.textContent='Offline';});

  unsubS=db.collection('sales').orderBy('ts','desc').limit(300).onSnapshot(snap=>{
    sales=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateBadges();
    if(TAB==='dashboard')renderDash();
    else if(TAB==='sales')renderSales();
    else if(TAB==='reports')renderReports();
  });

  document.getElementById('shell').classList.add('show');
  document.getElementById('loading').classList.add('out');
  setTimeout(()=>document.getElementById('loading').style.display='none',400);
  goTab('dashboard');
}

function buildNav(){
  const tabs=isAdmin()?[
    {id:'dashboard',icon:'grid',label:'Dashboard'},
    {id:'pos',icon:'cart',label:'Point of Sale',badge:'cart'},
    {id:'coldstore',icon:'ice',label:'Cold Store',ice:true},
    {id:'inventory',icon:'box',label:'Inventory',badge:'stock'},
    {id:'sales',icon:'list',label:'Sales History'},
    {id:'reports',icon:'chart',label:'Reports'},
    {id:'settings',icon:'cog',label:'Settings'},
  ]:[
    {id:'pos',icon:'cart',label:'Point of Sale',badge:'cart'},
    {id:'coldstore',icon:'ice',label:'Cold Store',ice:true},
    {id:'inventory',icon:'box',label:'Stock View',badge:'stock'},
  ];
  document.getElementById('snav').innerHTML=tabs.map(t=>`
    <button class="sni${t.ice?' sni-ice':''}" id="snav-${t.id}" onclick="goTab('${t.id}')">
      ${ico(t.icon,16)} ${t.label}
      ${t.badge?`<span id="snav-${t.badge}" class="sb-badge${t.badge==='stock'?' warn':''}" style="display:none"></span>`:''}
    </button>`).join('');
  document.getElementById('bnav').innerHTML=tabs.slice(0,5).map(t=>`
    <button class="nb${t.ice?' nbice':''}" id="nav-${t.id}" onclick="goTab('${t.id}')">
      <div style="position:relative;line-height:0">${ico(t.icon,20)}
        ${t.badge?`<span id="nav-${t.badge}" class="nbb${t.badge==='stock'?' warn':''}" style="display:none"></span>`:''}
      </div>
      <span>${t.label.split(' ')[0]}</span>
    </button>`).join('');
}

const TTLS={dashboard:'Dashboard',pos:'Point of Sale',coldstore:'Cold Store',
  inventory:()=>isAdmin()?'Inventory':'Stock View',sales:'Sales History',reports:'Reports',settings:'Settings'};

function goTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb,.sni').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+t)?.classList.add('active');
  document.getElementById('nav-'+t)?.classList.add('active');
  document.getElementById('snav-'+t)?.classList.add('active');
  const tl=TTLS[t];document.getElementById('tb-title').textContent=typeof tl==='function'?tl():(tl||t);
  TAB=t;
  if(t==='dashboard')renderDash();
  else if(t==='pos')renderPOS();
  else if(t==='coldstore')renderCold();
  else if(t==='inventory')renderInv();
  else if(t==='sales')renderSales();
  else if(t==='reports')renderReports();
  else if(t==='settings')renderSettings();
  updateBadges();
}

function updateBadges(){
  const low=products.filter(p=>p.qty<=p.minQty),cc=cart.reduce((a,i)=>a+i.qty,0);
  ['nav-cart','snav-cart'].forEach(id=>{const el=document.getElementById(id);if(el){el.style.display=cc>0?'flex':'none';el.textContent=cc;}});
  ['nav-stock','snav-stock'].forEach(id=>{const el=document.getElementById(id);if(el){el.style.display=low.length>0?'flex':'none';el.textContent=low.length;}});
  const msg=low.length?low.length+' item'+(low.length>1?'s':'')+' low':'';
  const ta=document.getElementById('tb-alert'),ma=document.getElementById('mob-alert');
  if(ta){ta.style.display=msg?'flex':'none';document.getElementById('tb-at').textContent=msg;}
  if(ma){ma.style.display=msg?'block':'none';ma.textContent=msg;}
}

// POS — search input never re-created, only product grid updates
function renderPOS(){
  const cats=['All',...new Set(products.filter(p=>!isCold(p)).map(p=>p.category))];
  if(!posRdy||!document.getElementById('pos-si')){
    document.getElementById('pos-top').innerHTML=`
      <div class="sw" style="margin-bottom:9px">
        <svg class="si" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="pos-si" placeholder="Search products…" autocomplete="off"/>
      </div>
      <div class="pills" id="pos-pills" style="margin-bottom:9px"></div>`;
    document.getElementById('pos-si').addEventListener('input',function(){psS=this.value;renderProdGrid();});
    posRdy=true;
  }
  const inp=document.getElementById('pos-si');
  if(inp&&inp.value!==psS)inp.value=psS;
  const pe=document.getElementById('pos-pills');
  if(pe)pe.innerHTML=cats.slice(0,12).map(c=>`<div class="pill${psC===c?' active':''}" onclick="psC='${c}';document.querySelectorAll('#pos-pills .pill').forEach(p=>p.classList.remove('active'));this.classList.add('active');renderProdGrid()">${c}</div>`).join('');
  document.getElementById('pos-body').innerHTML=mob()?`<div id="pos-prods"></div>`:`<div class="pos-layout"><div id="pos-prods"></div><div id="pos-cd"></div></div>`;
  renderProdGrid();
  if(!mob())renderCartD();
}

function renderProdGrid(){
  const fil=products.filter(p=>{
    if(isCold(p))return false;
    const mc=psC==='All'||p.category===psC;
    const ms=p.name.toLowerCase().includes(psS.toLowerCase())||p.category.toLowerCase().includes(psS.toLowerCase());
    return mc&&ms;
  });
  const el=document.getElementById('pos-prods');if(!el)return;
  let h='<div class="pgrid">';
  fil.forEach(p=>{
    const io=p.qty===0,il=p.qty>0&&p.qty<=p.minQty;
    h+=`<div class="ptile${io?' out':il?' low':''}" onclick="addToCart('${p.id}')">
      ${io?`<div class="ptb ob">Out</div>`:il?`<div class="ptb lb">Low</div>`:''}
      <div class="pname">${p.name}</div><div class="pcat">${p.category}</div>
      <div class="pfoot"><span class="pprice">${GH(p.price)}</span><span class="pstk${io?' ot':il?' lw':''}">${io?'0':p.qty+' '+p.unit}</span></div>
    </div>`;
  });
  if(!fil.length)h+=`<div style="grid-column:1/-1"><div class="empty"><div class="empty-icon">🔍</div><p>No products found</p></div></div>`;
  h+='</div>';
  el.innerHTML=h;
  mob()?renderCartM():renderCartD();
}

function cartItems(){
  return cart.map(i=>`<div class="citem">
    <span class="cname">${i.name}</span>
    <div class="qctl"><button class="qbtn" onclick="cartQ('${i.id}',-1)">−</button><span class="qnum">${i.qty}</span><button class="qbtn" onclick="cartQ('${i.id}',1)">+</button></div>
    <span class="csub${isColdId(i.id)?' cold-c':''}">${GH(i.price*i.qty)}</span>
    <button class="rmv" onclick="rmCart('${i.id}')">×</button>
  </div>`).join('');
}

function renderCartM(){
  const el=document.getElementById('pos-mc');if(!el)return;
  if(!cart.length){el.innerHTML='';return;}
  const t=cTotal();
  el.innerHTML=`<div style="background:#fff;border:1px solid var(--ln);border-radius:var(--rl);margin-bottom:11px;overflow:hidden;box-shadow:var(--sh)">
    <div class="cart-hdr"><span class="cart-hdr-t">Cart</span><div style="display:flex;align-items:center;gap:9px"><span class="cart-hdr-c">${cart.reduce((a,i)=>a+i.qty,0)} items</span><button class="btn btn-sm" onclick="clrCart()" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.18);font-size:11px">Clear</button></div></div>
    <div>${cartItems()}</div>
    <div class="cart-foot"><div class="ctr-row"><span class="ctr-lbl">Total</span><span class="ctr-val">${GH(t)}</span></div><button class="btn btn-p btn-full" onclick="openCheckout()"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Checkout</button></div>
  </div>`;
}

function renderCartD(){
  const el=document.getElementById('pos-cd');if(!el)return;
  const t=cTotal();
  let h=`<div class="cart-panel"><div class="cart-hdr"><span class="cart-hdr-t">Cart</span>${cart.length?`<button class="btn btn-sm" onclick="clrCart()" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.15);font-size:11px">Clear</button>`:''}</div>`;
  if(!cart.length)h+=`<div class="cart-empty"><svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:.18;display:block;margin:0 auto 10px"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Tap a product to add</div>`;
  else{
    h+=`<div class="cart-body">${cartItems()}</div>
    <div class="cart-foot"><div class="ctr-row"><span class="ctr-lbl">Total</span><span class="ctr-val">${GH(t)}</span></div>
    ${isAdmin()?`<div style="font-size:11px;color:var(--sft);text-align:right;margin-bottom:10px;font-weight:600">Est. profit: ${GH(cProfit())}</div>`:''}
    <button class="btn btn-p btn-full" onclick="openCheckout()"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Checkout — ${GH(t)}</button></div>`;
  }
  h+='</div>';el.innerHTML=h;
}

function addToCart(id){
  const p=products.find(x=>x.id===id);
  if(!p||p.qty===0){toast('Out of stock!','error');return;}
  const ex=cart.find(c=>c.id===id);
  if(ex){if(ex.qty>=p.qty){toast('Max stock reached','warn');return;}ex.qty++;}
  else cart.push({id:p.id,name:p.name,price:p.price,cost:p.cost,qty:1});
  updateBadges();mob()?renderCartM():renderCartD();
}
function cartQ(id,d){
  const item=cart.find(c=>c.id===id);if(!item)return;
  const p=products.find(x=>x.id===id);
  item.qty+=d;
  if(item.qty>p.qty){item.qty=p.qty;toast('Max stock reached','warn');}
  if(item.qty<=0){rmCart(id);return;}
  updateBadges();mob()?renderCartM():renderCartD();
}
function rmCart(id){cart=cart.filter(c=>c.id!==id);updateBadges();mob()?renderCartM():renderCartD();}
function clrCart(){if(!confirm('Clear the cart?'))return;cart=[];updateBadges();mob()?renderCartM():renderCartD();}

function openCheckout(){
  if(!cart.length)return;
  const t=cTotal(),pft=cProfit();
  let h=`<div class="mh"><span class="mt">Complete Sale</span><button class="mc" onclick="closeModal('checkout')">×</button></div>
  <div style="max-height:200px;overflow-y:auto;margin-bottom:11px;border:1px solid var(--ln);border-radius:var(--r);overflow:hidden">`;
  cart.forEach(i=>{h+=`<div class="chl" style="padding:8px 12px">${i.qty}× ${i.name}<span style="font-weight:700">${GH(i.price*i.qty)}</span></div>`;});
  h+=`</div><div class="cht"><span>Total</span><span style="color:var(--jade)">${GH(t)}</span></div><div style="margin-bottom:13px"></div>
  <label class="fl">Payment Method</label>
  <div class="ppills">
    <div class="ppill active" id="pay-Cash" onclick="selPay('Cash')">Cash</div>
    <div class="ppill" id="pay-MoMo" onclick="selPay('MoMo')">MoMo</div>
    <div class="ppill" id="pay-Card" onclick="selPay('Card')">Card</div>
    <div class="ppill" id="pay-Credit" onclick="selPay('Credit')">Credit</div>
  </div>
  <div id="cash-sec">
    <div class="fg"><label class="fl">Amount Tendered (GH₵)</label>
      <input type="number" id="amt" placeholder="${t.toFixed(2)}" step="0.5" oninput="calcChg(${t})" inputmode="decimal" style="font-size:20px;font-weight:700;text-align:center"/>
    </div>
    <div id="chg-out"></div>
  </div>
  <button class="btn btn-p btn-full" style="margin-top:13px;padding:13px" onclick="completeSale(${pft.toFixed(2)})">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    Complete Sale — ${GH(t)}

  document.getElementById('mbox-checkout').innerHTML=h;
  window._pay='Cash';openModal('checkout');

function selPay(m){
  window._pay=m;
  document.querySelectorAll('.ppill').forEach(e=>e.classList.remove('active'));
  document.getElementById('pay-'+m).classList.add('active');

function calcChg(t){

  if(!p){el.innerHTML='';return;}
  el.innerHTML=d<0?`<div class="chbox short"><div class="chlbl">Short by</div><div class="chval short">${GH(Math.abs(d))}</div></div>`:`<div class="chbox"><div class="chlbl">Change to give</div><div class="chval">${GH(d)}</div></div>`;

async function completeSale(profit){
  const t=cTotal(),method=window._pay||'Cash';
  if(method==='Cash'){const p=parseFloat(document.getElementById('amt')?.value)||0;if(p<t){toast('Insufficient payment!','error');return;}}
  const sale={
    date:toDay(),time:toNow(),
    items:cart.map(i=>({id:i.id,name:i.name,qty:i.qty,price:i.price})),
    total:t,profit:parseFloat(profit), // stored for admin — workers NEVER see this
    paymentMethod:method,
    amountPaid:method==='Cash'?(parseFloat(document.getElementById('amt')?.value)||t):t,
    ts:firebase.firestore.FieldValue.serverTimestamp(),
    soldBy:CU.email,
  };
  try{
    await db.collection('sales').add(sale);
    const b=db.batch();
    cart.forEach(ci=>{const p=products.find(x=>x.id===ci.id);if(p)b.update(db.collection('products').doc(p.id),{qty:Math.max(0,p.qty-ci.qty)});});
    await b.commit();
    const chg=sale.amountPaid-t;
    cart=[];closeModal('checkout');updateBadges();renderProdGrid();
    toast('Sale complete!'+(method==='Cash'&&chg>0?' Change: '+GH(chg):''),'success');
    goTab('dashboard');
  }catch(e){toast('Error: '+e.message,'error');}
}

function renderReports(){
  if(!isAdmin()){document.getElementById('rpc').innerHTML=`<div class="empty"><div class="empty-icon">🔒</div><p>Reports are visible to the store owner only.</p></div>`;return;}
  const tR=sales.reduce((a,s)=>a+s.total,0),tP=sales.reduce((a,s)=>a+(s.profit||0),0);
  const mg=tR>0?((tP/tR)*100).toFixed(1):0;
  const cR={};sales.forEach(s=>(s.items||[]).forEach(it=>{const prod=products.find(p=>p.id===it.id);cR[prod?.category||'Other']=(cR[prod?.category||'Other']||0)+(it.price*it.qty);}));
  const cA=Object.entries(cR).sort((a,b)=>b[1]-a[1]),mC=cA[0]?.[1]||1;
  const pC={};sales.forEach(s=>(s.items||[]).forEach(it=>{pC[it.name]=(pC[it.name]||0)+it.qty;}));
  const top=Object.entries(pC).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const pM={};sales.forEach(s=>{pM[s.paymentMethod]=(pM[s.paymentMethod]||0)+1;});
  let h=`<div class="sgrid">
    <div class="sc"><div class="sc-ac" style="background:linear-gradient(90deg,#1e4d2b,#3d8b50)"></div><div class="sc-lb">All-Time Revenue</div><div class="sc-v">${GH(tR)}</div></div>
    <div class="sc"><div class="sc-ac" style="background:linear-gradient(90deg,#0e4272,#1565c0)"></div><div class="sc-lb">All-Time Profit</div><div class="sc-v">${GH(tP)}</div></div>
    <div class="sc"><div class="sc-ac" style="background:linear-gradient(90deg,#b8963e,var(--gld))"></div><div class="sc-lb">Profit Margin</div><div class="sc-v">${mg}%</div></div>
    <div class="sc"><div class="sc-ac" style="background:linear-gradient(90deg,#7b2d2d,var(--red))"></div><div class="sc-lb">Total Sales</div><div class="sc-v">${sales.length}</div></div>
  </div>
  <div class="tcol"><div>
    <div class="stl">Revenue by Category</div><div class="card">`;
  if(!cA.length)h+=`<div class="empty" style="padding:14px"><p>No data yet</p></div>`;
  else cA.forEach(([cat,rev])=>{const cold=COLD_CATS.includes(cat);h+=`<div class="br"><div class="brl"><span${cold?' style="color:var(--sky);font-weight:600"':''}>${cat}${cold?' 🧊':''}</span><span style="font-weight:700">${GH(rev)}</span></div><div class="brt"><div class="brf${cold?' cold':''}" style="width:${(rev/mC*100).toFixed(1)}%"></div></div></div>`;});
  h+=`</div><div class="stl">Payment Methods</div><div class="card">`;
  Object.entries(pM).sort((a,b)=>b[1]-a[1]).forEach(([m,c])=>{h+=`<div class="ti"><span class="rkb" style="background:var(--frost);color:var(--sky)">${c}</span><span style="flex:1;font-size:13px;font-weight:600">${m}</span><span style="font-size:12px;color:var(--sft);font-weight:600">${sales.length?((c/sales.length)*100).toFixed(0):0}%</span></div>`;});
  h+=`</div></div><div>
    <div class="stl">Top Selling Products</div><div class="card">`;
  if(!top.length)h+=`<div class="empty" style="padding:14px"><p>No data yet</p></div>`;
  else top.forEach(([name,qty],i)=>{h+=`<div class="ti"><span class="rkb">${i+1}</span><span style="flex:1;font-size:13px;font-weight:600;color:var(--dim)">${name}</span><span style="font-size:12px;color:var(--sft);font-weight:600">${qty} sold</span></div>`;});
  h+=`</div><div class="stl">Inventory Snapshot</div><div class="card">
    <div class="ti"><span class="rkb" style="background:var(--foam);color:var(--jade)">${products.length}</span><span style="flex:1;font-size:13px;font-weight:600">Total Products</span></div>
    <div class="ti"><span class="rkb" style="background:var(--frost);color:var(--sky)">${products.filter(p=>isCold(p)).length}</span><span style="flex:1;font-size:13px;font-weight:600">Cold Store Items</span></div>
    <div class="ti"><span class="rkb" style="background:var(--gldb);color:var(--amb)">${products.filter(p=>p.qty<=p.minQty&&p.qty>0).length}</span><span style="flex:1;font-size:13px;font-weight:600">Low Stock</span></div>
    <div class="ti"><span class="rkb" style="background:#fff0f0;color:var(--red)">${products.filter(p=>p.qty===0).length}</span><span style="flex:1;font-size:13px;font-weight:600">Out of Stock</span></div>
  </div>
  <div class="stl">Export</div><div class="card">
    <p style="font-size:13px;color:var(--sft);margin-bottom:13px;font-weight:500">Download your complete sales data.</p>
    <button class="btn btn-s" onclick="exportCSV()"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export Sales CSV</button>
  </div></div></div>`;
  document.getElementById('rpc').innerHTML=h;
}
function exportCSV(){
  const rows=[['Date','Time','Items','Total (GH₵)','Profit (GH₵)','Payment','Sold By']];
  sales.forEach(s=>rows.push([s.date||'',s.time||'',(s.items||[]).map(i=>`${i.qty}x ${i.name}`).join('; '),s.total,(s.profit||0),s.paymentMethod||'',s.soldBy||'']));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download='frantreesa-sales-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();toast('CSV exported!','success');
}

// SETTINGS
async function renderSettings(){
  if(!isAdmin()){document.getElementById('stc').innerHTML=`<div class="empty"><div class="empty-icon">🔒</div><p>Settings visible to owner only.</p></div>`;return;}
  document.getElementById('stc').innerHTML=`<div style="display:flex;justify-content:center;padding:48px"><div style="width:30px;height:30px;border:3px solid var(--ln);border-top-color:var(--jade);border-radius:50%;animation:spin .7s linear infinite"></div></div>`;
  try{
    const snap=await db.collection('users').get();
    const users=snap.docs.map(d=>({id:d.id,...d.data()}));
    let h=`<div class="stl">Team Members</div>
    <div style="background:#fff;border:1px solid var(--ln);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);margin-bottom:14px">`;
    if(!users.length)h+=`<div class="empty" style="padding:22px"><p>No users yet</p></div>`;
    else users.forEach(u=>{
      const ini=(u.displayName||u.email||'?')[0].toUpperCase(),isMe=u.id===CU?.uid;
      h+=`<div class="user-row"><div class="uav ${u.role==='admin'?'adm':'wrk'}">${ini}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${u.displayName||u.email||'—'}${isMe?' <span style="font-size:11px;color:var(--sft);font-weight:500">(you)</span>':''}</div><div style="font-size:11px;color:var(--sft);margin-top:1px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.email||'—'}</div></div>
      <span class="tag ${u.role==='admin'?'tag-admin':'tag-worker'}">${u.role||'worker'}</span>
      ${!isMe?`<button class="btn btn-sm btn-d" onclick="rmUser('${u.id}','${u.email||u.displayName}')">Remove</button>`:''}
      </div>`;
    });
    h+=`</div>
    <button class="btn btn-p" onclick="openAddUser()"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Team Member</button>`;
    document.getElementById('stc').innerHTML=h;
  }catch(e){document.getElementById('stc').innerHTML=`<div class="alert err">Error: ${e.message}</div>`;}
}
function openAddUser(){
  let h=`<div class="mh"><span class="mt">Add Team Member</span><button class="mc" onclick="closeModal('adduser')">×</button></div>
  <div class="alert info" style="margin-bottom:15px">Creates an email/password account. Workers cannot see profit or cost prices. You can also add a Google user by entering their Gmail and any password — after they try to log in with Google, approve them here.</div>
  <div class="fg"><label class="fl">Email Address</label><input type="email" id="au-em" placeholder="worker@gmail.com"/></div>
  <div class="fg"><label class="fl">Password (min. 6 characters)</label><input type="password" id="au-pw" placeholder="••••••••"/></div>
  <div class="fg"><label class="fl">Role</label>
    <select id="au-rl">
      <option value="worker">Worker — can sell and view stock. Cannot see profit or costs.</option>
      <option value="admin">Admin — full access including profit, reports, settings.</option>
    </select>
  </div>
  <button class="btn btn-p btn-full" style="padding:13px" onclick="createUser()">Create Account</button>`;
  document.getElementById('mbox-adduser').innerHTML=h;openModal('adduser');
}
async function createUser(){
  const email=document.getElementById('au-em').value.trim();
  const pass=document.getElementById('au-pw').value;
  const role=document.getElementById('au-rl').value;
  if(!email||!pass){toast('Fill in all fields','error');return;}
  if(pass.length<6){toast('Password must be 6+ characters','error');return;}
  try{
    const sec=firebase.initializeApp(FB_CONFIG,'sec_'+Date.now());
    const sA=sec.auth();
    const cr=await sA.createUserWithEmailAndPassword(email,pass);
    const nuid=cr.user.uid;
    await sA.signOut();await sec.delete();
    await db.collection('users').doc(nuid).set({email,role,displayName:email.split('@')[0],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast(`${email} added as ${role}!`,'success');closeModal('adduser');renderSettings();
  }catch(e){toast('Error: '+e.message,'error');}
}
async function rmUser(id,name){
  if(!confirm(`Remove ${name}? They will lose access immediately.`))return;
  try{await db.collection('users').doc(id).delete();toast('User removed','warn');renderSettings();}
  catch(e){toast('Error: '+e.message,'error');}
}

window.addEventListener('resize',()=>{
  if(TAB==='pos'){mob()?renderCartM():renderCartD();}
  if(TAB==='coldstore')renderCold();
});
